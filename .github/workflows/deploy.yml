name: Push 기반 CI/CD 테스트

# container 브랜치에서 push 이벤트(리슨->on)가 발생되면 아래 설정한 내용되고 작동한다!!
on:
  push:
    branches: [ "container" ]

jobs:
  # app 관련 이미지 생성 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)
  ci:
    runs-on:  ubuntu-latest
    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name: 코드 checkout
        uses: actions/checkout@v3
      
      # 도커허브 로그인 -> ID/PW
      # 시크릿 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
      - name: Docker hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # fastapi app 에 대한 이미지 빌드 푸시 동시진행
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.0

      # 사용자명/nginx-proxy:1.0 형태로 이미지 빌드 -> 푸시
      - name: Build and Push fastapi app
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0

  
  # EC2에 docker-compose.yml, 설정파일등 copy, 도커컴포즈 작동
  # EC2에 docker-compose.yml 설정파일 copy
  # docker-compose ssh 명령어 실행
  cd:
    # ci 작업이 완료된 후 진행
    needs : ci
    runs-on: ubuntu-latest
    steps:
      # 체크아웃, 소스코드를 ci서버에 다운
      - name: 코드 checkout
        uses: actions/checkout@v3
      # 파일복사
      - name: Docker Compose File Setup
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: ./docker-compose.yml
          target: "/home/ubuntu/"
      # Docker Compose 명령어 실행
      - name: Docker Compose Build
        run: |
          #cd /home/ubuntu
          # 필요시 .env 파일생성(생략)
          docker compose pull   # 최신 이미지 가져오기
          docker compose up -d  # 신규 & 교체 작업
          docker image prune    # 이미지 버전 업 시 기존 이미지 삭제   
          
        shell: bash



    