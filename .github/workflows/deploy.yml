name: Push 기반 CI/CD 테스트

# 트리거 지점, CI/CD가 작동되는 원인, 이벤트 등 정의
# main branch에서 push 이벤트가 발생되면 아래 설정한 내용대로 작동
on:
  push:
    branches:
      - main

# 개별 작업(jobs)을 순서대로 나열(파이프라인)
jobs:
  ci:
    runs-on: ubuntu-latest
    # 작업단계지정
    steps:
      # Source Checkout
      - name: 코드 checkout 
        uses: actions/checkout@v3

      # 환경변수 파일 생성(생략)
      
      # 확인 or 단위테스트
      - name: 확인 검증
        # 여러 명령어 작동 시 `-`를 통해 배치
        run:  |
          pwd
          ls -al
          cat main.py
        shell: bash
      
      # [CD 작업 시작]
      # CI 서버 -> EC2 서버로 배포(SSH)
      # AWS에서 EC2 생성 -> ip/domain, ubuntu(사용자명), key(.pem)
      # Github Repository의 secrets 변수로 위의 3개 값 세팅
      # SSH Port를 모든 IP 접근 가능하도록 개방
      - name: Source copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: .
          target: "/home/ubuntu/projects/"
      
      # 서비스 재가동
      - name: Run Script And Service Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          scripts: |
            #cd /home/ubuntu/projects  #1. 프로젝트 폴더 위치로 이동
            #./web/bin/pip install -r requirements.txt   # 2 필요 패키지 설치
            sudo systemctl restart hello.service  # 3. 서비스 재시작

